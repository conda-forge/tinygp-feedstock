schema_version: 1

context:
  name: tinygp
  version: "0.3.1"
  python_min: "3.11"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/tinygp-${{ version }}.tar.gz
  sha256: 14cd14dc4d33e15ac58a91b8aab71fb234524ccd1b52e40dc80fdf08d1f045d6

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - hatchling
    - hatch-vcs
    - pip
    - python ${{ python_min }}.*
  run:
    - jax
    - equinox
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - tinygp
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: The tiniest of Gaussian Process libraries
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/dfm/tinygp
  documentation: https://tinygp.readthedocs.io/

extra:
  recipe-maintainers:
    - thewchan
