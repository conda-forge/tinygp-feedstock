{% set name = "tinygp" %}
{% set version = "0.3.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/tinygp-{{ version }}.tar.gz
  sha256: 14cd14dc4d33e15ac58a91b8aab71fb234524ccd1b52e40dc80fdf08d1f045d6

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - hatchling
    - hatch-vcs
    - pip
    - python {{ python_min }}
  run:
    - jax
    - jaxlib
    - equinox
    - python >={{ python_min }}

test:
  imports:
    - tinygp
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/dfm/tinygp
  doc_url: https://tinygp.readthedocs.io/
  summary: The tiniest of Gaussian Process libraries
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - thewchan
